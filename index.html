<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" 
    content="width=device-width, initial-scale=1.0">
    <title>TO_Do List</title>
    <!-- ربط ملف الـ Manifest اللي فيه الأيقونة واسم التطبيق -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4F7CFF">

<!-- كود جافا سكريبت لتشغيل الـ Service Worker -->

</head>
<body>
    <h1>👉 To_Do List 👈</h1>
 <div class="container">
       
    <label for="task">TASK :</label>
    <input type="text" id="t" name="task" 
    placeholder="Go To School." required>
    <button id="b" onclick="go()">submit</button>

    <div id="p" ></div>
 </div>
    <script src="app.js"></script>
    <script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("service-worker.js");
  });
}
</script>
</body>
</html>
